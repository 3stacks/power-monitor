version: "3.8"

services:
  power-monitor:
    build: .
    container_name: power-monitor
    restart: unless-stopped
    volumes:
      - ./data:/data
    ports:
      - "3333:3333"
    environment:
      - PING_TARGET=8.8.8.8
      - PING_INTERVAL_MS=60000
      - DB_PATH=/data/power-monitor.db
      - WEB_PORT=3333
